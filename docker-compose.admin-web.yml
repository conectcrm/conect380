services:
  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
      args:
        VITE_ADMIN_API_URL: ${ADMIN_WEB_API_URL:-http://localhost:3001}
    container_name: conect360-admin-web
    restart: unless-stopped
    ports:
      - "${ADMIN_WEB_PORT:-3010}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3

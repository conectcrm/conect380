name: Deploy with Error Budget Check

on:
  push:
    branches:
      - production
  workflow_dispatch:
    inputs:
      override_freeze:
        description: "Override deploy freeze (requires CTO approval)"
        required: false
        type: boolean
        default: false
      override_misconfigured:
        description: "Override when Prometheus URL is unavailable/misconfigured (manual deploy only)"
        required: false
        type: boolean
        default: false

env:
  # No fallback by design. If secret is missing, workflow marks as MISCONFIGURED.
  PROMETHEUS_URL: ${{ secrets.PROMETHEUS_URL }}

jobs:
  check-error-budget:
    name: Check Error Budget
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.check.outputs.can_deploy }}
      budget_status: ${{ steps.check.outputs.status }}
      budget_remaining: ${{ steps.check.outputs.remaining }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq bc

      - name: Check error budget
        id: check
        env:
          OVERRIDE_DEPLOY: ${{ github.event.inputs.override_freeze }}
          OVERRIDE_DEPLOY_FREEZE: ${{ github.event.inputs.override_freeze }}
          OVERRIDE_DEPLOY_MISCONFIGURED: ${{ github.event.inputs.override_misconfigured }}
        run: |
          # Missing Prometheus URL: block by default, allow only explicit manual override.
          if [ -z "${PROMETHEUS_URL:-}" ]; then
            if [ "${OVERRIDE_DEPLOY_MISCONFIGURED:-false}" = "true" ]; then
              echo "can_deploy=true" >> "$GITHUB_OUTPUT"
              echo "status=MISCONFIGURED_OVERRIDE" >> "$GITHUB_OUTPUT"
              echo "remaining=" >> "$GITHUB_OUTPUT"
              echo "⚠️ PROMETHEUS_URL not configured. Manual override accepted." >> "$GITHUB_STEP_SUMMARY"
              echo "👤 Actor: ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "can_deploy=false" >> "$GITHUB_OUTPUT"
              echo "status=MISCONFIGURED" >> "$GITHUB_OUTPUT"
              echo "remaining=" >> "$GITHUB_OUTPUT"
              echo "❌ PROMETHEUS_URL not configured." >> "$GITHUB_STEP_SUMMARY"
              echo "➡️ Configure repository secret PROMETHEUS_URL or run with self-hosted runner in the same network." >> "$GITHUB_STEP_SUMMARY"
            fi
            exit 0
          fi

          chmod +x scripts/can-deploy.sh
          chmod +x scripts/check-error-budget.sh

          if ./scripts/can-deploy.sh; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
            echo "status=NORMAL" >> "$GITHUB_OUTPUT"
            echo "remaining=" >> "$GITHUB_OUTPUT"
            echo "✅ Deploy allowed by error budget policy." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          EXIT_CODE=$?
          echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          echo "❌ Deploy blocked (exit code: $EXIT_CODE)." >> "$GITHUB_STEP_SUMMARY"

          if [ -f /tmp/error-budget-status.json ]; then
            STATUS=$(jq -r '.error_budget.status // "UNKNOWN"' /tmp/error-budget-status.json)
            REMAINING=$(jq -r '.error_budget.remaining_percent // ""' /tmp/error-budget-status.json)
            echo "status=$STATUS" >> "$GITHUB_OUTPUT"
            echo "remaining=$REMAINING" >> "$GITHUB_OUTPUT"
            echo "### Error Budget Status: $STATUS" >> "$GITHUB_STEP_SUMMARY"
            if [ -n "$REMAINING" ]; then
              echo "Budget Remaining: $REMAINING%" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "status=UNKNOWN" >> "$GITHUB_OUTPUT"
            echo "remaining=" >> "$GITHUB_OUTPUT"
          fi

          # Exit code 99 usually means Prometheus check infra issue.
          if [ "$EXIT_CODE" -eq 99 ] && [ "${OVERRIDE_DEPLOY_MISCONFIGURED:-false}" = "true" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
            echo "status=MISCONFIGURED_OVERRIDE" >> "$GITHUB_OUTPUT"
            echo "⚠️ Error budget check unavailable (exit 99). Manual override accepted." >> "$GITHUB_STEP_SUMMARY"
            echo "👤 Actor: ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Keep job green; gating happens through outputs.
          exit 0

      - name: Upload error budget status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-budget-status
          path: /tmp/error-budget-status.json
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check-error-budget
    if: needs.check-error-budget.outputs.can_deploy == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22.16.0"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests
        working-directory: backend
        run: npm test

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/dist

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [check-error-budget, build]
    if: needs.check-error-budget.outputs.can_deploy == 'true'
    environment:
      name: production
      url: https://conectcrm.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download build artifact
        uses: actions/download-artifact@v3
        with:
          name: backend-build
          path: backend/dist

      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # Add deployment commands here (scp/rsync/kubectl/docker/etc)

      - name: Notify success
        if: success()
        run: |
          echo "Deploy completed successfully"
          echo "Error Budget Status: ${{ needs.check-error-budget.outputs.budget_status }}"
          echo "Budget Remaining: ${{ needs.check-error-budget.outputs.budget_remaining }}%"

      - name: Log deploy freeze override
        if: github.event.inputs.override_freeze == 'true'
        run: |
          echo "DEPLOY FREEZE WAS OVERRIDDEN"
          echo "Approver: ${{ github.actor }}"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Commit: ${{ github.sha }}"

      - name: Log misconfigured override
        if: github.event.inputs.override_misconfigured == 'true'
        run: |
          echo "MISCONFIGURED ERROR-BUDGET CHECK WAS OVERRIDDEN"
          echo "Approver: ${{ github.actor }}"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Commit: ${{ github.sha }}"

  notify-blocked:
    name: Notify Deploy Blocked
    runs-on: ubuntu-latest
    needs: check-error-budget
    if: needs.check-error-budget.outputs.can_deploy != 'true'

    steps:
      - name: Notify team
        run: |
          echo "Deploy blocked by error budget gate"
          echo "Status: ${{ needs.check-error-budget.outputs.budget_status }}"
          echo "Budget Remaining: ${{ needs.check-error-budget.outputs.budget_remaining }}%"

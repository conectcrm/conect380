    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Detectar mudancas relevantes (Billing Critical)
        id: billing_critical_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            billing_critical:
              - '.github/workflows/ci.yml'
              - 'e2e/billing-*.spec.ts'
              - 'e2e/fixtures.ts'
              - 'playwright.config.ts'
              - 'frontend-web/src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'frontend-web/package.json'
              - 'frontend-web/package-lock.json'

      - name: Pular E2E Billing Critical (sem mudancas relevantes)
        if: steps.billing_critical_changes.outputs.billing_critical != 'true'
        run: echo "Sem alteracoes no escopo de billing critical; job finalizado sem executar Playwright."

      - name: Setup Node.js
        if: steps.billing_critical_changes.outputs.billing_critical == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend-web/package-lock.json

      - name: Instalar dependencias root (Playwright)
        if: steps.billing_critical_changes.outputs.billing_critical == 'true'
        run: npm ci

      - name: Instalar dependencias frontend
        if: steps.billing_critical_changes.outputs.billing_critical == 'true'
        run: npm --prefix frontend-web ci

      - name: Instalar browser Chromium (Playwright)
        if: steps.billing_critical_changes.outputs.billing_critical == 'true'
        run: npx playwright install --with-deps chromium

      - name: Subir frontend (modo CI)
        if: steps.billing_critical_changes.outputs.billing_critical == 'true'
        env:
          PORT: '3000'
          BROWSER: 'none'
          CI: 'true'
        run: |
          nohup npm --prefix frontend-web run start:docker > frontend.log 2>&1 &
          echo $! > frontend.pid

          for i in $(seq 1 90); do
            if curl -fsS http://localhost:3000 > /dev/null; then
              echo "Frontend disponivel em http://localhost:3000"
              exit 0
            fi
            sleep 2
          done

          echo "Frontend nao iniciou a tempo."
          tail -n 200 frontend.log || true
          exit 1

      - name: Rodar E2E Billing Critical (Playwright)
        if: steps.billing_critical_changes.outputs.billing_critical == 'true'

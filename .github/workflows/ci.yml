          retention-days: 14

      - name: Encerrar frontend
        if: ${{ always() && steps.billing_critical_changes.outputs.billing_critical == 'true' }}
        run: |
          if [ -f frontend.pid ]; then
            kill "$(cat frontend.pid)" || true
          fi

  frontend-guardian-exposure-scan:
    name: Frontend - Guardian Exposure Scan
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Detectar mudancas relevantes (Guardian Exposure Scan)
        id: guardian_exposure_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            guardian_exposure:
              - '.github/workflows/ci.yml'
              - 'scripts/ci/guardian-exposure-scan.ps1'
              - 'frontend-web/src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'frontend-web/package.json'
              - 'frontend-web/package-lock.json'

      - name: Pular Guardian Exposure Scan (sem mudancas relevantes)
        if: steps.guardian_exposure_changes.outputs.guardian_exposure != 'true'
        run: echo "Sem alteracoes no escopo de guardian exposure scan; job finalizado."

      - name: Setup Node.js
        if: steps.guardian_exposure_changes.outputs.guardian_exposure == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend-web/package-lock.json

      - name: Instalar dependencias root
        if: steps.guardian_exposure_changes.outputs.guardian_exposure == 'true'
        run: npm ci

      - name: Instalar dependencias frontend
        if: steps.guardian_exposure_changes.outputs.guardian_exposure == 'true'
        run: npm --prefix frontend-web ci

      - name: Rodar Guardian exposure scan
        if: steps.guardian_exposure_changes.outputs.guardian_exposure == 'true'
        run: pwsh -NoLogo -NoProfile -File ./scripts/ci/guardian-exposure-scan.ps1

  frontend-e2e-core-admin-billing-governance:
    name: Frontend - E2E Core Admin Billing Governance (Playwright)
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar mudancas relevantes (Core Admin Billing Governance)
        id: core_admin_billing_governance_changes
        run: |
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR HEAD^ HEAD || true)
          else
            CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r --diff-filter=ACMR HEAD || true)
          fi

          if echo "$CHANGED_FILES" | grep -E '^(e2e/core-admin-billing-governance.spec.ts|e2e/core-admin-responsive-visual.spec.ts|playwright.config.ts|frontend-web/src/|backend/src/modules/core-admin/|backend/src/modules/planos/|package\.json|package-lock\.json|frontend-web/package\.json|frontend-web/package-lock\.json)' >/dev/null; then
            echo "core_admin_billing_governance=true" >> $GITHUB_OUTPUT
          else
            echo "core_admin_billing_governance=false" >> $GITHUB_OUTPUT
          fi

      - name: Pular E2E Core Admin Billing Governance (sem mudancas relevantes)
        if: steps.core_admin_billing_governance_changes.outputs.core_admin_billing_governance != 'true'
        run: echo "Sem alteracoes no escopo core-admin billing governance; job finalizado sem executar Playwright."

      - name: Setup Node.js
        if: steps.core_admin_billing_governance_changes.outputs.core_admin_billing_governance == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend-web/package-lock.json

      - name: Instalar dependencias root (Playwright)
        if: steps.core_admin_billing_governance_changes.outputs.core_admin_billing_governance == 'true'
        run: npm ci

      - name: Instalar dependencias frontend-web
        if: steps.core_admin_billing_governance_changes.outputs.core_admin_billing_governance == 'true'
        run: npm --prefix frontend-web ci

      - name: Instalar browser Chromium (Playwright)
        if: steps.core_admin_billing_governance_changes.outputs.core_admin_billing_governance == 'true'
        run: npx playwright install --with-deps chromium

      - name: Subir frontend-web (modo CI)
        if: steps.core_admin_billing_governance_changes.outputs.core_admin_billing_governance == 'true'
        env:
          CI: 'true'
        run: |
          nohup npm --prefix frontend-web start > frontend-web.log 2>&1 &
          echo $! > frontend-web.pid

          for i in $(seq 1 90); do
            if curl -fsS http://localhost:3000 > /dev/null; then
              echo "Frontend web disponivel em http://localhost:3000"
              exit 0
            fi
            sleep 2
          done

          echo "Frontend web nao iniciou a tempo."
          tail -n 200 frontend-web.log || true
          exit 1

      - name: Rodar E2E Core Admin Governance (Playwright)
        if: steps.core_admin_billing_governance_changes.outputs.core_admin_billing_governance == 'true'
        env:
          CORE_ADMIN_FRONTEND_URL: http://localhost:3000
        run: |
          npm run test:e2e:core-admin:billing:governance
          npm run test:e2e:core-admin:visual

      - name: Upload artefatos Playwright (Core Admin Billing Governance)
        if: ${{ !cancelled() && steps.core_admin_billing_governance_changes.outputs.core_admin_billing_governance == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-admin-billing-governance-artifacts
          path: |
            playwright-report/
            test-results/
            frontend-web.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Encerrar frontend-web
        if: ${{ always() && steps.core_admin_billing_governance_changes.outputs.core_admin_billing_governance == 'true' }}
        run: |
          if [ -f frontend-web.pid ]; then
            kill "$(cat frontend-web.pid)" || true
          fi

  security:
    name: Analise de Seguranca
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: javascript, typescript
          config-file: ./.github/codeql/codeql-config.yml

      - name: Executar analise CodeQL
        uses: github/codeql-action/analyze@v2

  check-temp-files:
    name: Verificar Arquivos Temporarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Verificar arquivos temporarios
        run: |
          echo "Verificando arquivos temporarios alterados no commit..."
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR HEAD^ HEAD || true)
          else
            CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r --diff-filter=ACMR HEAD || true)
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "Nenhum arquivo alterado detectado no commit atual."
            exit 0
          fi

          TEMP_FILES=$(echo "$CHANGED_FILES" \
            | grep -E '(^|/)(test-|debug-|temp-|exemplo-|CORRECAO_|DEBUG_)' \
            | grep -Ev '^scripts/test-.*\.ps1$' \
            || true)

          if [ -n "$TEMP_FILES" ]; then
            echo "Arquivos temporarios encontrados:"
            echo "$TEMP_FILES"
            exit 1
          else
            echo "Nenhum arquivo temporario encontrado."
          fi

  final-status:
    name: Status Final do CI
    runs-on: ubuntu-latest
    needs: [encoding-guardrails, release-flags-guardrails, backend, backend-e2e-cotacao, backend-e2e-contas-pagar, backend-e2e-multi-tenancy, backend-e2e-vendas, backend-e2e-core-admin-hardening, backend-e2e-core-admin-security, frontend, frontend-e2e-pipeline-ui, frontend-e2e-billing-critical, frontend-guardian-exposure-scan, frontend-e2e-core-admin-billing-governance, security, check-temp-files]
    if: always()

    steps:
      - name: Verificar status dos jobs
        run: |
          echo "Encoding Guardrails: ${{ needs.encoding-guardrails.result }}"
          echo "Release Flags Guardrails: ${{ needs.release-flags-guardrails.result }}"
          echo "Backend: ${{ needs.backend.result }}"
          echo "Backend E2E Cotacao: ${{ needs.backend-e2e-cotacao.result }}"
          echo "Backend E2E Contas Pagar: ${{ needs.backend-e2e-contas-pagar.result }}"
          echo "Backend E2E Multi-Tenancy: ${{ needs.backend-e2e-multi-tenancy.result }}"
          echo "Backend E2E Vendas: ${{ needs.backend-e2e-vendas.result }}"
          echo "Backend E2E Core Admin Hardening: ${{ needs.backend-e2e-core-admin-hardening.result }}"
          echo "Backend E2E Core Admin Security: ${{ needs.backend-e2e-core-admin-security.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Frontend E2E Pipeline UI (escopo Comercial Core): ${{ needs.frontend-e2e-pipeline-ui.result }}"
          echo "Frontend E2E Billing Critical: ${{ needs.frontend-e2e-billing-critical.result }}"
          echo "Frontend Guardian Exposure Scan: ${{ needs.frontend-guardian-exposure-scan.result }}"
          echo "Frontend E2E Core Admin Billing Governance: ${{ needs.frontend-e2e-core-admin-billing-governance.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Temp Files Check: ${{ needs.check-temp-files.result }}"

          if [ "${{ needs.encoding-guardrails.result }}" != "success" ] || \
             [ "${{ needs.release-flags-guardrails.result }}" != "success" ] || \
             [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.backend-e2e-cotacao.result }}" != "success" ] || \
             [ "${{ needs.backend-e2e-contas-pagar.result }}" != "success" ] || \
             [ "${{ needs.backend-e2e-multi-tenancy.result }}" != "success" ] || \
             [ "${{ needs.backend-e2e-vendas.result }}" != "success" ] || \
             [ "${{ needs.backend-e2e-core-admin-hardening.result }}" != "success" ] || \
             [ "${{ needs.backend-e2e-core-admin-security.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.frontend-e2e-pipeline-ui.result }}" != "success" ] || \
             [ "${{ needs.frontend-e2e-billing-critical.result }}" != "success" ] || \
             [ "${{ needs.frontend-guardian-exposure-scan.result }}" != "success" ] || \
             [ "${{ needs.frontend-e2e-core-admin-billing-governance.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.check-temp-files.result }}" != "success" ]; then
            echo "CI falhou em um ou mais jobs"
            exit 1
          else
            echo "Todos os jobs passaram com sucesso"
          fi

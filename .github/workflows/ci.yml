          done

          echo "Frontend nao iniciou a tempo."
          tail -n 200 frontend.log || true
          exit 1

      - name: Rodar E2E Billing Critical (Playwright)
        if: steps.billing_critical_changes.outputs.billing_critical == 'true'
        env:
          TEST_E2E_AUTH_MODE: mock
        run: npm run test:e2e:billing:critical

      - name: Upload artefatos Playwright (Billing Critical)
        if: ${{ !cancelled() && steps.billing_critical_changes.outputs.billing_critical == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-billing-critical-artifacts
          path: |
            playwright-report/
            test-results/
            frontend.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Encerrar frontend
        if: ${{ always() && steps.billing_critical_changes.outputs.billing_critical == 'true' }}
        run: |
          if [ -f frontend.pid ]; then
            kill "$(cat frontend.pid)" || true
          fi

  frontend-guardian-exposure-scan:
    name: Frontend - Guardian Exposure Scan
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar mudancas relevantes (Guardian Exposure Scan)
        id: guardian_exposure_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            guardian_exposure:
              - '.github/workflows/ci.yml'
              - 'scripts/ci/guardian-exposure-scan.ps1'
              - 'frontend-web/src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'frontend-web/package.json'
              - 'frontend-web/package-lock.json'

      - name: Pular Guardian Exposure Scan (sem mudancas relevantes)
        if: steps.guardian_exposure_changes.outputs.guardian_exposure != 'true'
        run: echo "Sem alteracoes no escopo de guardian exposure scan; job finalizado."

      - name: Setup Node.js
        if: steps.guardian_exposure_changes.outputs.guardian_exposure == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend-web/package-lock.json

      - name: Instalar dependencias root
        if: steps.guardian_exposure_changes.outputs.guardian_exposure == 'true'
        run: npm ci

      - name: Instalar dependencias frontend
        if: steps.guardian_exposure_changes.outputs.guardian_exposure == 'true'
        run: npm --prefix frontend-web ci

      - name: Rodar Guardian exposure scan
        if: steps.guardian_exposure_changes.outputs.guardian_exposure == 'true'
        run: pwsh -NoLogo -NoProfile -File ./scripts/ci/guardian-exposure-scan.ps1

  frontend-e2e-guardian-billing-governance:
    name: Frontend - E2E Guardian Billing Governance (Playwright)
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar mudancas relevantes (Guardian Billing Governance)
        id: guardian_billing_governance_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            guardian_billing_governance:
              - '.github/workflows/ci.yml'
              - 'e2e/guardian-billing-governance.spec.ts'
              - 'e2e/guardian-responsive-visual.spec.ts'
              - 'playwright.config.ts'
              - 'guardian-web/src/**'
              - 'backend/src/modules/guardian/**'
              - 'backend/src/modules/planos/**'
              - 'package.json'
              - 'package-lock.json'
              - 'guardian-web/package.json'
              - 'guardian-web/package-lock.json'

      - name: Pular E2E Guardian Billing Governance (sem mudancas relevantes)
        if: steps.guardian_billing_governance_changes.outputs.guardian_billing_governance != 'true'
        run: echo "Sem alteracoes no escopo guardian billing governance; job finalizado sem executar Playwright."

      - name: Setup Node.js
        if: steps.guardian_billing_governance_changes.outputs.guardian_billing_governance == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            guardian-web/package-lock.json

      - name: Instalar dependencias root (Playwright)
        if: steps.guardian_billing_governance_changes.outputs.guardian_billing_governance == 'true'
        run: npm ci

      - name: Instalar dependencias guardian-web
        if: steps.guardian_billing_governance_changes.outputs.guardian_billing_governance == 'true'
        run: npm --prefix guardian-web ci

      - name: Instalar browser Chromium (Playwright)
        if: steps.guardian_billing_governance_changes.outputs.guardian_billing_governance == 'true'
        run: npx playwright install --with-deps chromium

      - name: Subir guardian-web (modo CI)
        if: steps.guardian_billing_governance_changes.outputs.guardian_billing_governance == 'true'
        env:
          CI: 'true'
        run: |
          nohup npm --prefix guardian-web run dev > guardian.log 2>&1 &
          echo $! > guardian.pid

          for i in $(seq 1 90); do
            if curl -fsS http://localhost:3020 > /dev/null; then
              echo "Guardian web disponivel em http://localhost:3020"
              exit 0
            fi
            sleep 2
          done

          echo "Guardian web nao iniciou a tempo."
          tail -n 200 guardian.log || true
          exit 1

      - name: Rodar E2E Guardian Billing Governance (Playwright)
        if: steps.guardian_billing_governance_changes.outputs.guardian_billing_governance == 'true'
        env:
          GUARDIAN_FRONTEND_URL: http://localhost:3020
        run: npm run test:e2e:guardian:billing:governance

      - name: Upload artefatos Playwright (Guardian Billing Governance)
        if: ${{ !cancelled() && steps.guardian_billing_governance_changes.outputs.guardian_billing_governance == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-guardian-billing-governance-artifacts
          path: |
            playwright-report/
            test-results/
            guardian.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Encerrar guardian-web
        if: ${{ always() && steps.guardian_billing_governance_changes.outputs.guardian_billing_governance == 'true' }}
        run: |
          if [ -f guardian.pid ]; then
            kill "$(cat guardian.pid)" || true
          fi

  security:
    name: Analise de Seguranca
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: javascript, typescript
          config-file: ./.github/codeql/codeql-config.yml

      - name: Executar analise CodeQL
        uses: github/codeql-action/analyze@v2

  check-temp-files:
    name: Verificar Arquivos Temporarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Verificar arquivos temporarios
        run: |
          echo "Verificando arquivos temporarios alterados no commit..."
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR HEAD^ HEAD || true)
          else
            CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r --diff-filter=ACMR HEAD || true)
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "Nenhum arquivo alterado detectado no commit atual."
            exit 0
          fi

          TEMP_FILES=$(echo "$CHANGED_FILES" \
            | grep -E '(^|/)(test-|debug-|temp-|exemplo-|CORRECAO_|DEBUG_)' \
            | grep -Ev '^scripts/test-.*\.ps1$' \
            || true)

          if [ -n "$TEMP_FILES" ]; then
            echo "Arquivos temporarios encontrados:"
            echo "$TEMP_FILES"
            exit 1
          else
            echo "Nenhum arquivo temporario encontrado."
          fi

  final-status:
    name: Status Final do CI
    runs-on: ubuntu-latest
    needs: [encoding-guardrails, release-flags-guardrails, backend, backend-e2e-cotacao, backend-e2e-contas-pagar, backend-e2e-multi-tenancy, backend-e2e-vendas, backend-e2e-guardian-hardening, backend-e2e-guardian-security, frontend, frontend-e2e-pipeline-ui, frontend-e2e-billing-critical, frontend-guardian-exposure-scan, frontend-e2e-guardian-billing-governance, security, check-temp-files]
    if: always()

    steps:
      - name: Verificar status dos jobs
        run: |
          echo "Encoding Guardrails: ${{ needs.encoding-guardrails.result }}"
          echo "Release Flags Guardrails: ${{ needs.release-flags-guardrails.result }}"
          echo "Backend: ${{ needs.backend.result }}"
          echo "Backend E2E Cotacao: ${{ needs.backend-e2e-cotacao.result }}"
          echo "Backend E2E Contas Pagar: ${{ needs.backend-e2e-contas-pagar.result }}"
          echo "Backend E2E Multi-Tenancy: ${{ needs.backend-e2e-multi-tenancy.result }}"
          echo "Backend E2E Vendas: ${{ needs.backend-e2e-vendas.result }}"
          echo "Backend E2E Guardian Hardening: ${{ needs.backend-e2e-guardian-hardening.result }}"
          echo "Backend E2E Guardian Security: ${{ needs.backend-e2e-guardian-security.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Frontend E2E Pipeline UI (escopo Comercial Core): ${{ needs.frontend-e2e-pipeline-ui.result }}"
          echo "Frontend E2E Billing Critical: ${{ needs.frontend-e2e-billing-critical.result }}"
          echo "Frontend Guardian Exposure Scan: ${{ needs.frontend-guardian-exposure-scan.result }}"
          echo "Frontend E2E Guardian Billing Governance: ${{ needs.frontend-e2e-guardian-billing-governance.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Temp Files Check: ${{ needs.check-temp-files.result }}"

          if [ "${{ needs.encoding-guardrails.result }}" != "success" ] || \
             [ "${{ needs.release-flags-guardrails.result }}" != "success" ] || \
             [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.backend-e2e-cotacao.result }}" != "success" ] || \
             [ "${{ needs.backend-e2e-contas-pagar.result }}" != "success" ] || \
             [ "${{ needs.backend-e2e-multi-tenancy.result }}" != "success" ] || \
             [ "${{ needs.backend-e2e-vendas.result }}" != "success" ] || \
             [ "${{ needs.backend-e2e-guardian-hardening.result }}" != "success" ] || \
             [ "${{ needs.backend-e2e-guardian-security.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.frontend-e2e-pipeline-ui.result }}" != "success" ] || \
             [ "${{ needs.frontend-e2e-billing-critical.result }}" != "success" ] || \
             [ "${{ needs.frontend-guardian-exposure-scan.result }}" != "success" ] || \
             [ "${{ needs.frontend-e2e-guardian-billing-governance.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.check-temp-files.result }}" != "success" ]; then
            echo "CI falhou em um ou mais jobs"
            exit 1
          else
            echo "Todos os jobs passaram com sucesso"
          fi

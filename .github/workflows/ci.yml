name: CI - Testes e Build

on:
  workflow_dispatch:
  push:
    branches: [main, develop, consolidacao-*]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

jobs:
  encoding-guardrails:
    name: Guardrails - Encoding
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'

      - name: Detectar arquivos alterados
        run: |
          set -e

          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            echo "Verificando diff do commit atual (HEAD^..HEAD)"
            git diff --name-only --diff-filter=ACMR HEAD^ HEAD > changed_files.txt || true
          else
            echo "Sem pai local para HEAD; usando diff-tree no commit atual"
            git diff-tree --no-commit-id --name-only -r --diff-filter=ACMR HEAD > changed_files.txt || true
          fi

          echo "Arquivos alterados (primeiros 50):"
          head -n 50 changed_files.txt || true

      - name: Rodar check de encoding (arquivos alterados)
        run: |
          if [ ! -s changed_files.txt ]; then
            echo "Nenhum arquivo alterado para verificar."
            exit 0
          fi

          cat changed_files.txt | node scripts/checkEncoding.js --stdin

  release-flags-guardrails:
    name: Guardrails - Release Flags Vendas (Core Baseline)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'

      - name: Validar baseline GO Core das flags de vendas
        run: npm run validate:release:vendas:core

  backend:
    name: Backend - Testes e Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias backend
        run: npm --prefix backend ci

      - name: Type-check backend
        run: npm --prefix backend run type-check

      - name: Build backend
        run: npm --prefix backend run build

  backend-e2e-cotacao:
    name: Backend - E2E Cotacao
    runs-on: ubuntu-latest
    needs: backend
    env:
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret
      DATABASE_HOST: localhost
      DATABASE_PORT: '5434'
      DATABASE_USERNAME: conectcrm
      DATABASE_PASSWORD: conectcrm123
      DATABASE_NAME: conectcrm_test
      TYPEORM_USE_TS: 'true'
      REDIS_HOST: localhost
      REDIS_PORT: '6379'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: conectcrm
          POSTGRES_PASSWORD: conectcrm123
          POSTGRES_DB: conectcrm_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U conectcrm -d conectcrm_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Detectar mudancas relevantes (E2E Cotacao)
        id: cotacao_changes
        run: |
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR HEAD^ HEAD || true)
          else
            CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r --diff-filter=ACMR HEAD || true)
          fi

          if echo "$CHANGED_FILES" | grep -E '^(backend/src/modules/cotacao/|backend/src/modules/financeiro/|backend/src/modules/pedidos/|backend/test/cotacao/|backend/test/_support/|backend/package\.json|backend/package-lock\.json)' >/dev/null; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Pular E2E Cotacao (sem mudancas relevantes)
        if: steps.cotacao_changes.outputs.run != 'true'
        run: echo "Sem alteracoes no escopo de cotacao; job finalizado sem executar testes."

      - name: Setup Node.js
        if: steps.cotacao_changes.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias backend
        if: steps.cotacao_changes.outputs.run == 'true'
        run: npm --prefix backend ci

      - name: Aplicar migrations na base de teste e2e
        if: steps.cotacao_changes.outputs.run == 'true'
        run: npm --prefix backend run migration:run

      - name: Rodar E2E de cotacao
        if: steps.cotacao_changes.outputs.run == 'true'
        run: npm --prefix backend run test:e2e:cotacao


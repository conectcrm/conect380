    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Instalar dependencias frontend
        run: npm --prefix frontend-web ci

      - name: Sanity check frontend
        run: npm --prefix frontend-web run deps:check || true

      - name: Validar gate tenant do catalogo flexivel
        env:
          CI: true
        run: npm --prefix frontend-web run test -- --runTestsByPath src/services/__tests__/produtosService.catalogGate.test.ts --watch=false --runInBand

  # Mantemos o nome/id legado deste job para nao quebrar branch protection ou required checks
  # ja configurados no repositório. O escopo efetivo executado aqui e o Comercial Core.
  frontend-e2e-pipeline-ui:
    name: Frontend - E2E Pipeline UI (Playwright)
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar mudancas relevantes (Comercial Core)
        id: comercial_core_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            comercial_core:
              - '.github/workflows/ci.yml'
              - 'e2e/pipeline-*.spec.ts'
              - 'e2e/propostas-*.spec.ts'
              - 'e2e/pipeline-ui.helpers.ts'
              - 'e2e/fixtures.ts'
              - 'playwright.config.ts'
              - 'frontend-web/craco.config.js'
              - 'frontend-web/src/pages/PipelinePage.tsx'
              - 'frontend-web/src/features/propostas/**'
              - 'frontend-web/src/components/modals/ModalNovaProposta.tsx'
              - 'frontend-web/src/components/oportunidades/**'
              - 'frontend-web/src/services/api.ts'
              - 'frontend-web/src/services/oportunidadesService.ts'
              - 'frontend-web/src/services/modulosService.ts'
              - 'frontend-web/src/services/minhasEmpresasService.ts'
              - 'frontend-web/src/contexts/AuthContext.tsx'
              - 'frontend-web/src/contexts/EmpresaContextAPIReal.tsx'
              - 'frontend-web/src/hooks/useModuloAtivo.ts'
              - 'frontend-web/src/components/licensing/PermissionPathGuard.tsx'
              - 'frontend-web/src/types/oportunidades/**'
              - 'frontend-web/src/App.tsx'
              - 'package.json'
              - 'package-lock.json'
              - 'frontend-web/package.json'
              - 'frontend-web/package-lock.json'

      - name: Pular E2E Comercial Core (sem mudancas relevantes)
        if: steps.comercial_core_changes.outputs.comercial_core != 'true'
        run: echo "Sem alteracoes no escopo comercial core; job finalizado sem executar Playwright."

      - name: Setup Node.js
        if: steps.comercial_core_changes.outputs.comercial_core == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend-web/package-lock.json

      - name: Instalar dependencias root (Playwright)
        if: steps.comercial_core_changes.outputs.comercial_core == 'true'
        run: npm ci

      - name: Instalar dependencias frontend
        if: steps.comercial_core_changes.outputs.comercial_core == 'true'
        run: npm --prefix frontend-web ci

      - name: Instalar browser Chromium (Playwright)
        if: steps.comercial_core_changes.outputs.comercial_core == 'true'
        run: npx playwright install --with-deps chromium

      - name: Subir frontend (modo CI)
        if: steps.comercial_core_changes.outputs.comercial_core == 'true'
        env:
          PORT: '3000'
          BROWSER: 'none'
          CI: 'true'
        run: |
          nohup npm --prefix frontend-web run start:docker > frontend.log 2>&1 &
          echo $! > frontend.pid

          for i in $(seq 1 90); do
            if curl -fsS http://localhost:3000 > /dev/null; then
              echo "Frontend disponivel em http://localhost:3000"
              exit 0
            fi
            sleep 2
          done

          echo "Frontend nao iniciou a tempo."
          tail -n 200 frontend.log || true
          exit 1

      - name: Rodar E2E Pipeline UI (escopo Comercial Core)
        if: steps.comercial_core_changes.outputs.comercial_core == 'true'
        run: npm run test:e2e:comercial:core

      - name: Upload artefatos Playwright (Comercial Core)
        if: ${{ !cancelled() && steps.comercial_core_changes.outputs.comercial_core == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-comercial-core-artifacts
          path: |
            playwright-report/
            test-results/
            frontend.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Encerrar frontend
        if: ${{ always() && steps.comercial_core_changes.outputs.comercial_core == 'true' }}
        run: |
          if [ -f frontend.pid ]; then
            kill "$(cat frontend.pid)" || true
          fi


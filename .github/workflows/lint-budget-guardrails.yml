name: Lint Budget Guardrails

on:
  # Required checks cannot depend on top-level PR path filters, otherwise
  # GitHub may never create the status for valid PRs outside backend/frontend.
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'backend/**'
      - 'frontend-web/**'
      - 'scripts/ci/**'
      - '.github/workflows/**'
      - 'tsconfig.json'
  workflow_dispatch:

jobs:
  lint-budget:
    name: Lint Budget Guardrails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect relevant changes for lint budget
        id: lint_scope
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            lint_scope:
              - 'backend/**'
              - 'frontend-web/**'
              - 'scripts/ci/**'
              - '.github/workflows/**'
              - 'tsconfig.json'

      - name: Skip lint budget when scope is unrelated
        if: github.event_name != 'workflow_dispatch' && steps.lint_scope.outputs.lint_scope != 'true'
        run: echo "No backend/frontend/lint-related changes detected; lint budget guardrail marked as passed."

      - name: Setup Node.js
        if: github.event_name == 'workflow_dispatch' || steps.lint_scope.outputs.lint_scope == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend-web/package-lock.json

      - name: Install backend dependencies
        if: github.event_name == 'workflow_dispatch' || steps.lint_scope.outputs.lint_scope == 'true'
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        if: github.event_name == 'workflow_dispatch' || steps.lint_scope.outputs.lint_scope == 'true'
        working-directory: frontend-web
        run: npm ci

      - name: Lint budget check
        if: github.event_name == 'workflow_dispatch' || steps.lint_scope.outputs.lint_scope == 'true'
        shell: pwsh
        run: |
          ./scripts/ci/lint-budget-check.ps1

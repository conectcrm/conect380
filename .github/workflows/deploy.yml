name: CD - Deploy para Produção

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente de deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '22.16.0'

jobs:
  # ==============================================================================
  # Job 1: Build e Preparação
  # ==============================================================================
  build:
    name: Build Backend e Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      # Backend Build
      - name: 📦 Instalar dependências (Backend)
        working-directory: backend
        run: npm ci --production=false
      
      - name: 🏗️ Build Backend
        working-directory: backend
        run: npm run build
      
      - name: 📦 Upload Backend Build
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
      
      # Frontend Build
      - name: 📦 Instalar dependências (Frontend)
        working-directory: frontend-web
        run: npm ci --production=false
      
      - name: 🏗️ Build Frontend
        working-directory: frontend-web
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
      
      - name: 📦 Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend-web/build

  # ==============================================================================
  # Job 2: Deploy Backend
  # ==============================================================================
  deploy-backend:
    name: Deploy Backend para AWS/Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    env:
      AWS_EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
      AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 📦 Download Backend Build
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
      
      # Opção 1: Deploy para AWS EC2
      - name: 🚀 Deploy para Azure VM (SSH)
        if: ${{ env.AWS_EC2_HOST != '' }}
        uses: appleboy/ssh-action@v1.0.0
        env:
          DEPLOY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          envs: DEPLOY_GITHUB_TOKEN,GITHUB_REPOSITORY,GITHUB_SHA,DATABASE_NAME,DATABASE_USERNAME,DATABASE_PASSWORD,JWT_SECRET
          script: |
            set -eu
            mkdir -p /home/azureuser/conect360
            cd /home/azureuser/conect360
            if [ ! -d /home/azureuser/conect360/.git ]; then
              git init
              git remote add origin "https://x-access-token:${DEPLOY_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            fi
            git remote set-url origin "https://x-access-token:${DEPLOY_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git fetch --all --tags
            git fetch --depth 1 origin "${GITHUB_SHA}"
            git checkout -f "${GITHUB_SHA}"
            git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
            echo "Deploying commit $(git rev-parse --short HEAD)"
            echo "Disk usage before cleanup:"
            df -h
            cd .production
            ENV_FILE=""
            for candidate in .env.production .env.prod .env; do
              if [ -f "${candidate}" ]; then
                ENV_FILE="${candidate}"
                break
              fi
            done
            if [ -z "${ENV_FILE}" ]; then
              ENV_FILE=".env.production"
            fi
            [ -f "${ENV_FILE}" ] || touch "${ENV_FILE}"
            set -a
            . "./${ENV_FILE}"
            set +a
            POSTGRES_CONTAINER="$(docker ps -a --format '{{.Names}}' | grep -E 'postgres' | head -n1 || true)"
            BACKEND_CONTAINER="$(docker ps -a --format '{{.Names}}' | grep -E 'backend' | head -n1 || true)"
            DB_PASSWORD="${DATABASE_PASSWORD:-}"
            DB_USERNAME="${DATABASE_USERNAME:-}"
            DB_NAME="${DATABASE_NAME:-}"
            JWT_SECRET_VALUE="${JWT_SECRET:-}"
            if [ -n "${POSTGRES_CONTAINER}" ]; then
              if [ -z "${DB_PASSWORD}" ]; then
                DB_PASSWORD="$(docker inspect "${POSTGRES_CONTAINER}" --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | grep '^POSTGRES_PASSWORD=' | head -n1 | cut -d= -f2- || true)"
              fi
              if [ -z "${DB_USERNAME}" ]; then
                DB_USERNAME="$(docker inspect "${POSTGRES_CONTAINER}" --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | grep '^POSTGRES_USER=' | head -n1 | cut -d= -f2- || true)"
              fi
              if [ -z "${DB_NAME}" ]; then
                DB_NAME="$(docker inspect "${POSTGRES_CONTAINER}" --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | grep '^POSTGRES_DB=' | head -n1 | cut -d= -f2- || true)"
              fi
            fi
            if [ -n "${BACKEND_CONTAINER}" ] && [ -z "${JWT_SECRET_VALUE}" ]; then
              JWT_SECRET_VALUE="$(docker inspect "${BACKEND_CONTAINER}" --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | grep '^JWT_SECRET=' | head -n1 | cut -d= -f2- || true)"
            fi
            if [ -z "${DB_PASSWORD}" ] && [ -n "${POSTGRES_CONTAINER}" ]; then
              docker start "${POSTGRES_CONTAINER}" >/dev/null 2>&1 || true
              DB_PASSWORD="conectcrm_prod_2026_secure"
              docker exec -u postgres "${POSTGRES_CONTAINER}" psql -d postgres -c "ALTER USER postgres WITH PASSWORD '${DB_PASSWORD}';" >/dev/null
            fi
            : "${DB_USERNAME:=postgres}"
            : "${DB_NAME:=conectcrm}"
            if [ -z "${DB_PASSWORD}" ]; then
              echo "Falha: nao foi possivel recuperar DATABASE_PASSWORD para ${ENV_FILE}."
              exit 1
            fi
            if [ -z "${JWT_SECRET_VALUE}" ]; then
              JWT_SECRET_VALUE="$(openssl rand -hex 32 2>/dev/null || true)"
            fi
            if [ -z "${JWT_SECRET_VALUE}" ]; then
              JWT_SECRET_VALUE="$(cat /proc/sys/kernel/random/uuid 2>/dev/null | tr -d '-')"
            fi
            if [ -z "${JWT_SECRET_VALUE}" ]; then
              echo "Falha: nao foi possivel definir JWT_SECRET para ${ENV_FILE}."
              exit 1
            fi
            TMP_ENV="$(mktemp)"
            grep -Ev '^(DATABASE_NAME|DATABASE_USERNAME|DATABASE_PASSWORD|JWT_SECRET)=' "${ENV_FILE}" > "${TMP_ENV}" || true
            {
              cat "${TMP_ENV}"
              echo "DATABASE_NAME=${DB_NAME}"
              echo "DATABASE_USERNAME=${DB_USERNAME}"
              echo "DATABASE_PASSWORD=${DB_PASSWORD}"
              echo "JWT_SECRET=${JWT_SECRET_VALUE}"
            } > "${ENV_FILE}"
            rm -f "${TMP_ENV}"
            set -a
            . "./${ENV_FILE}"
            set +a
            docker image prune -af
            echo "Disk usage after cleanup:"
            df -h
            docker compose --env-file "${ENV_FILE}" up -d postgres redis
            docker compose --env-file "${ENV_FILE}" build backend frontend
            docker compose --env-file "${ENV_FILE}" up -d backend
            docker compose --env-file "${ENV_FILE}" run --rm backend npm run migration:run
            docker compose --env-file "${ENV_FILE}" up -d frontend
            BACKEND_READY=0
            for i in $(seq 1 45); do
              if curl -fsS --max-time 3 http://127.0.0.1:3500/health > /dev/null; then
                BACKEND_READY=1
                break
              fi
              sleep 2
            done
            if [ "${BACKEND_READY}" -ne 1 ]; then
              echo "Falha: backend nao respondeu no health check apos o deploy."
              docker compose --env-file "${ENV_FILE}" ps || true
              docker compose --env-file "${ENV_FILE}" logs --tail=200 backend || true
              exit 1
            fi
      - name: 🚀 Deploy para Azure App Service
        if: ${{ env.AZURE_WEBAPP_NAME != '' }}
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend
      
      # Opção 3: Deploy com Docker
      - name: 🐳 Build e Push Docker Image
        if: ${{ env.DOCKER_HUB_USERNAME != '' }}
        run: |
          echo ${{ secrets.DOCKER_HUB_PASSWORD }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/conectsuite-backend:${{ github.sha }} ./backend
          docker tag ${{ secrets.DOCKER_HUB_USERNAME }}/conectsuite-backend:${{ github.sha }} ${{ secrets.DOCKER_HUB_USERNAME }}/conectsuite-backend:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/conectsuite-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/conectsuite-backend:latest

  # ==============================================================================
  # Job 3: Deploy Frontend
  # ==============================================================================
  deploy-frontend:
    name: Deploy Frontend para Vercel/Netlify
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      AWS_CLOUDFRONT_DISTRIBUTION: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION }}
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 📦 Download Frontend Build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-web/build
      
      # Opção 1: Deploy para Vercel
      - name: 🚀 Deploy para Vercel
        if: ${{ env.VERCEL_TOKEN != '' }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend-web
          vercel-args: '--prod'
      
      # Opção 2: Deploy para Netlify
      - name: 🚀 Deploy para Netlify
        if: ${{ env.NETLIFY_AUTH_TOKEN != '' }}
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: frontend-web/build
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      
      # Opção 3: Deploy para AWS S3 + CloudFront
      - name: 🚀 Deploy para AWS S3
        if: ${{ env.AWS_S3_BUCKET != '' }}
        uses: jakejarvis/s3-sync-action@v0.5.1
        with:
          args: --acl public-read --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: 'us-east-1'
          SOURCE_DIR: 'frontend-web/build'
      
      - name: 🔄 Invalidar CloudFront Cache
        if: ${{ env.AWS_CLOUDFRONT_DISTRIBUTION != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION }} \
            --paths "/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # ==============================================================================
  # Job 4: Rodar Migrations
  # ==============================================================================
  run-migrations:
    name: Executar Migrations no Banco de Dados
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    env:
      DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
      DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 📦 Instalar dependências
        working-directory: backend
        run: npm ci
      
      - name: 🗄️ Rodar Migrations
        if: ${{ env.DATABASE_HOST != '' && env.DATABASE_USERNAME != '' && env.DATABASE_NAME != '' }}
        working-directory: backend
        run: npm run migration:run

  # ==============================================================================
  # Job 5: Health Check Pós-Deploy
  # ==============================================================================
  health-check:
    name: Verificação de Saúde Pós-Deploy
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    
    steps:
      - name: 🏥 Verificar Backend
        run: |
          if [ -z "${{ secrets.BACKEND_URL }}" ]; then
            echo "ℹ️ BACKEND_URL não configurado. Pulando health check do backend."
            exit 0
          fi
          echo "Verificando backend em ${{ secrets.BACKEND_URL }}"
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.BACKEND_URL }}/health || echo "000")
          
          if [ "$response" = "200" ]; then
            echo "✅ Backend está saudável (200 OK)"
          else
            echo "❌ Backend não respondeu corretamente (HTTP $response)"
            exit 1
          fi
      
      - name: 🏥 Verificar Frontend
        run: |
          if [ -z "${{ secrets.FRONTEND_URL }}" ]; then
            echo "ℹ️ FRONTEND_URL não configurado. Pulando health check do frontend."
            exit 0
          fi
          echo "Verificando frontend em ${{ secrets.FRONTEND_URL }}"
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.FRONTEND_URL }} || echo "000")
          
          if [ "$response" = "200" ]; then
            echo "✅ Frontend está acessível (200 OK)"
          else
            echo "❌ Frontend não respondeu corretamente (HTTP $response)"
            exit 1
          fi
      
      - name: 📊 Notificar Sucesso
        if: success()
        run: echo "🎉 Deploy concluído com sucesso!"
      
      - name: 📊 Notificar Falha
        if: failure()
        run: echo "❌ Deploy falhou! Verifique os logs."

  # ==============================================================================
  # Job 6: Notificações
  # ==============================================================================
  notify:
    name: Enviar Notificações
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, health-check]
    if: always()
    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    
    steps:
      - name: 📧 Notificar Slack
        if: ${{ env.SLACK_WEBHOOK != '' }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Deploy do Conect360 ${{ job.status }}!
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      
      - name: 📧 Notificar Discord
        if: ${{ env.DISCORD_WEBHOOK != '' }}
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "Deploy Conect360"
          description: |
            **Branch**: ${{ github.ref }}
            **Commit**: ${{ github.sha }}
            **Status**: ${{ job.status }}
